app-id: org.chromium.Chromium
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
base: org.chromium.Chromium.BaseApp
base-version: '24.08'
command: chromium
finish-args:
  - --require-version=1.8.2
  - --filesystem=home
  - --filesystem=/run/.heim_org.h5l.kcm-socket
  - --device=all
  - --env=LD_LIBRARY_PATH=/app/chromium/nonfree-codecs/lib
  - --share=ipc
  - --share=network
  - --socket=cups
  - --socket=pulseaudio
  - --socket=x11
  - --socket=wayland
  - --system-talk-name=org.bluez
  - --system-talk-name=org.freedesktop.Avahi
  - --system-talk-name=org.freedesktop.UPower
  - --talk-name=com.canonical.AppMenu.Registrar
  - --talk-name=org.freedesktop.FileManager1
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.ScreenSaver
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.kde.kwalletd5
  - --talk-name=org.kde.kwalletd6
  - --talk-name=org.gnome.SessionManager
  - --own-name=org.mpris.MediaPlayer2.chromium.*

add-extensions:
  org.chromium.Chromium.Codecs:
    directory: chromium/nonfree-codecs
    add-ld-path: lib
    bundle: true
    autodelete: true

  org.chromium.Chromium.NativeMessagingHost:
    version: '1'
    directory: chromium/native-messaging-hosts
    merge-dirs: native-messaging-hosts
    subdirectories: true
    no-autodownload: true
    autodelete: true

  org.chromium.Chromium.Extension:
    version: '1'
    directory: chromium/extensions
    merge-dirs: extensions;native-messaging-hosts;policies/managed;policies/recommended
    subdirectories: true
    no-autodownload: true
    autodelete: true

  org.chromium.Chromium.Policy:
    version: '1'
    directory: chromium/policies
    merge-dirs: policies/managed;policies/recommended
    subdirectories: true
    no-autodownload: true
    autodelete: true

sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm18
  - org.freedesktop.Sdk.Extension.node24
  - org.freedesktop.Sdk.Extension.openjdk21

modules:
  - name: readelf-symlink
    only-arches: [aarch64]
    buildsystem: simple
    build-commands:
      # Chromium expects to find readelf with its full toolprefix on arm64
      - ln -s /usr/bin/readelf /app/bin/aarch64-linux-gnu-readelf

  - name: extensions
    buildsystem: simple
    build-commands:
      - mkdir -p /app/chromium/{extensions,native-messaging-hosts,policies}
      - for dir in native-messaging-hosts policies; do ln -s /app/chromium/{$dir,extensions}/$dir;
        done
      - touch /app/chromium/extensions/no-mount-stamp

  - name: esbuild
    buildsystem: simple
    build-options:
      strip: false
      no-debuginfo: true
    cleanup:
      - '*'
    build-commands:
      - mkdir -p /app/lib/sdk/esbuild
      - mv bin /app/lib/sdk/esbuild
    sources:
      - type: archive
        url: https://registry.npmjs.org/@esbuild/linux-x64/-/linux-x64-0.25.1.tgz
        sha256: a3972c20d19545792ba6c6abe564b61c91f66cfa242ff9bffd9e5d59c65452e5
        only-arches: [x86_64]
      - type: archive
        url: https://registry.npmjs.org/@esbuild/linux-arm64/-/linux-arm64-0.25.1.tgz
        sha256: 70771c9212585cfd1b190465f92dae98d1d3fc4a4fab5cacbef71457ee08e254
        only-arches: [aarch64]

  - name: rust-nightly
    buildsystem: simple
    build-options:
      strip: false
      no-debuginfo: true
    cleanup:
      - '*'
    sources:
      - type: archive
        only-arches:
          - aarch64
        dest: rust
        url: https://static.rust-lang.org/dist/2026-02-27/rust-nightly-aarch64-unknown-linux-gnu.tar.xz
        sha256: 4fd094f8cce7ed0e4584e32098cb15aa9454d4897da82de03c3c038005726ae8
        # x-checker-data:
        #  type: rust
        #  package: rust
        #  channel: nightly
        #  target: aarch64-unknown-linux-gnu
      - type: archive
        only-arches:
          - x86_64
        dest: rust
        url: https://static.rust-lang.org/dist/2026-02-27/rust-nightly-x86_64-unknown-linux-gnu.tar.xz
        sha256: 971cfa784a48181aeca6a6c390e74a30b9859d80b82a729e6a0c450242fdc498
        # x-checker-data:
        #  type: rust
        #  package: rust
        #  channel: nightly
        #  target: x86_64-unknown-linux-gnu
      - type: archive
        dest: rust-src
        url: https://static.rust-lang.org/dist/2026-02-27/rust-src-nightly.tar.xz
        sha256: a9edaecdb62629377ae64912e11acda132020899cfef2de4a2fa5306f1dd2448
        # x-checker-data:
        #  type: rust
        #  package: rust-src
        #  channel: nightly
        #  target: '*'
    build-commands:
      - cd rust && ./install.sh --prefix=/app/lib/sdk/rust-nightly --without=rust-docs
        --without=rust-docs-json-preview --disable-ldconfig --verbose
      - cd rust-src && ./install.sh --prefix=/app/lib/sdk/rust-nightly --disable-ldconfig
        --verbose

  - name: rust-bindgen
    buildsystem: simple
    build-options:
      strip: false
      no-debuginfo: true
      prepend-path: /app/lib/sdk/rust-nightly/bin
      env:
        CARGO_HOME: /run/build/rust-bindgen/cargo
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo --offline build --release --verbose
      - install -Dm 755 target/release/bindgen -t /app/lib/sdk/bindgen/bin
      - ln -s /app/lib/sdk/rust-nightly/bin/rustfmt /app/lib/sdk/bindgen/bin
    sources:
      - type: git
        url: https://chromium.googlesource.com/external/github.com/rust-lang/rust-bindgen
        commit: 2426dd68cd12e0ac022bca18efb9c7d0acd27e12
      - ./generated-sources.bindgen.json
    cleanup:
      - '*'

  - name: chromium
    buildsystem: simple
    build-options:
      prepend-ld-library-path: /app/lib/sdk/rust-nightly/lib
    build-commands:
      - ./bootstrap.sh
      - ./build.sh
      - ./install.sh
    sources:
      - type: archive
        url: https://commondatastorage.googleapis.com/chromium-browser-official/chromium-147.0.7727.101.tar.xz
        sha256: 8430437ccb9756c9e8fa179e1899e49fceeac28cd2dee433a514a4a8ab22611b
        x-checker-data:
          type: chromium
          component: chromium
          is-main-source: true
      - type: shell
        commands:
          - rm -rf third_party/llvm-build
          - rm -rf third_party/rust-toolchain
      - type: archive
        url: https://commondatastorage.googleapis.com/chromium-browser-clang/Linux_x64/clang-llvmorg-23-init-5669-g8a0be0bc-1.tar.xz
        sha256: 750b331006635281d7d90696629f67db748ba62004c46675eccb8af144141847
        dest: third_party/llvm-build/Release+Asserts
        strip-components: 0
        only-arches: [x86_64]
        x-checker-data:
          type: chromium
          component: llvm-prebuilt
      - type: archive
        url: https://commondatastorage.googleapis.com/chromium-browser-clang/Linux_x64/rust-toolchain-6f54d591c3116ee7f8ce9321ddeca286810cc142-7-llvmorg-23-init-5669-g8a0be0bc.tar.xz
        sha256: afbb00d27b8f9f65e6a754fb21e80dff084993285cf7f3c0020dece59c5bd67a
        dest: third_party/rust-toolchain
        strip-components: 0
        only-arches: [x86_64]
        # TODO
        # x-checker-data:
        #   type: chromium
        #   component: llvm-prebuilt
      - type: shell
        commands:
          - rm -rf third_party/llvm
        only-arches: [aarch64]
      - type: git
        url: https://chromium.googlesource.com/external/github.com/llvm/llvm-project
        commit: llvmorg-23-init-5669-g8a0be0bc
        dest: third_party/llvm
        only-arches: [aarch64]
        x-checker-data:
          type: chromium
          component: llvm-git
      - type: archive
        url: https://npm.skia.org/chrome-devtools/@rollup%2frollup-linux-arm64-gnu/-/rollup-linux-arm64-gnu-4.22.4.tgz
        sha256: 15dacc4a625c90f790c199ebb06e3327baee2f4a2163e1ee13643b0d8c29ac37
        dest: third_party/devtools-frontend/src/node_modules/@rollup/rollup-linux-arm64-gnu
      - patches/chromium/_sources.json
      - type: file
        path: org.chromium.Chromium.desktop
      - type: file
        path: org.chromium.Chromium.metainfo.xml
      - type: file
        path: chromium.sh
      - type: file
        path: unlink_profiles.py
      - type: file
        path: cobalt.ini
      - type: dir
        path: build-aux
